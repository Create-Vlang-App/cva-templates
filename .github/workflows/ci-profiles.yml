name: CI Profiles (L3)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    name: Generate profile matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      count: ${{ steps.set.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI helpers
        run: pip install -r scripts/ci/requirements.txt

      - name: Generate L3 matrix
        id: set
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${BASE_REF}"
            git fetch origin "${BASE_REF}" --depth=1 || true
            python scripts/ci/generate-matrix.py --layer profiles --changed-only --base-ref "$BASE"
          else
            python scripts/ci/generate-matrix.py --layer profiles
          fi

  profiles:
    name: ${{ matrix.cell.id }}
    needs: generate
    if: needs.generate.outputs.count != '0'
    strategy:
      fail-fast: false
      matrix:
        cell: ${{ fromJson(needs.generate.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up V
        uses: vlang/setup-v@v1
        with:
          stable: true
          cache: true

      - name: Install Python helpers
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI helpers
        run: pip install -r scripts/ci/requirements.txt

      - name: Install published create-vlang-app CLI
        run: bash scripts/ci/install-cva-cli.sh

      - name: Scaffold check (curated profile)
        env:
          CI: "true"
          CVA_SKIP_GIT: "1"
        run: |
          ADDON_ARGS=()
          for url in ${{ join(matrix.cell.addons, ' ') }}; do
            ADDON_ARGS+=(--addon-url "$url")
          done
          python scripts/ci/run-scaffold-check.py \
            --template-url "${{ matrix.cell.templateUrl }}" \
            --workdir "${{ runner.temp }}/cva-l3" \
            "${ADDON_ARGS[@]}"
