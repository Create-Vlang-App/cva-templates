name: CI Templates (L1)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    name: Generate template matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      count: ${{ steps.set.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI helpers
        run: pip install -r scripts/ci/requirements.txt

      - name: Generate L1 matrix
        id: set
        run: python scripts/ci/generate-matrix.py --layer templates

  templates:
    name: ${{ matrix.cell.id }}
    needs: generate
    if: needs.generate.outputs.count != '0'
    strategy:
      fail-fast: false
      matrix:
        cell: ${{ fromJson(needs.generate.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up V
        uses: vlang/setup-v@v1
        with:
          stable: true
          cache: true

      - name: Install Python helpers
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI helpers
        run: pip install -r scripts/ci/requirements.txt

      - name: Clone create-vlang-app (until VPM publish — #24)
        run: git clone --depth 1 https://github.com/Create-Vlang-App/create-vlang-app.git /tmp/create-vlang-app

      - name: Scaffold check (template alone)
        env:
          CI: "true"
          CVA_SKIP_GIT: "1"
          CVA_CI_ALLOW_GIT_CLI: "1"
          CVA_CI_CLI_SOURCE: /tmp/create-vlang-app
        run: |
          python scripts/ci/run-scaffold-check.py \
            --template-url "${{ matrix.cell.templateUrl }}" \
            --workdir "${{ runner.temp }}/cva-l1"
