name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: vlang/setup-v@v1
        with:
          stable: true
          cache: true
      - name: Format check
        run: v fmt -verify .
      - name: Vet
        run: v vet .
      - name: Test
        run: v test .
